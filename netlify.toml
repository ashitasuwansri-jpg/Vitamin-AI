[build]
  publish = "."
  functions = "netlify/functions"

# Redirect หน้าแรก
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Custom Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# ตั้งค่า Functions
[functions]
  node_bundler = "esbuild"
